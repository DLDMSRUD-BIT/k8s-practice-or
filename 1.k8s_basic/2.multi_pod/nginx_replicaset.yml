apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  namespace: dmsrud-ns  # 네임스페이스 지정시, 여기에 지정
spec:
  replicas: 2
  # 아래의 label은 replicaset이 관리할 pod을 결정하는데 사용
  selector:
    matchLabels:
      app: my-nginx
  template:
  # 아래의 label은 service에서 라우팅할 대상이 되는 label service의 selector.app와 일치해야 함
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: my-service      # 클러스트 내에서 서비스의 이름은 url주소(엔드포인트로 사용 ex)http://my-service:포트번호))로 사용되므로 유일해야함
  namespace: dmsrud-ns  # 네임스페이스 지정시, 여기에 지정
spec:
  type: ClusterIP  # 안적어도 기본값이 ClusterIP
  ports:
  # port는 서비스의 포트번호, targetPort는 pod내에 컨테이너의 포트번호(내부포트)
  - port: 80
    targetPort: 80
    # seielector .app는 pod의 라벨명과 일치해야 매핑이 됨
  selector:
    app: my-nginx  #라벨명