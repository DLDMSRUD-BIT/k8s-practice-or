server:
  #  port번호가 0번이경우 0~65535 중에 현제 host에서 사용하지 않는 port임의로 사용
  port: 8080

eureka:
  client:
    enabled: false
product:
  service:
    url: "http://product-service"
spring:
  config:
    activate:
      on-profile: prod
  application:
    name: ordering-service
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL=true
    username: admin
    password: ${DB_PW}
    #    db의 낮은 스펙과 msa의 많은 커넥션 감안한 커넥션 최소 설정
    hikari:
      maximum-pool-size: 1
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto : create
    show_sql: true
  redis:
    host: redis-service
    port: 6379
  kafka:
    kafka-server: kafka-service:9092

